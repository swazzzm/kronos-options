# ══════════════════════════════════════════════════════════════════════
#  Kronos Options Signal System — Master Configuration
#  Credentials go in .env ONLY. Never hardcode tokens here.
# ══════════════════════════════════════════════════════════════════════

# ── Instruments ────────────────────────────────────────────────────────
instruments:
  NIFTY:
    upstox_key: "NSE_INDEX|Nifty 50"
    zerodha_symbol: "NIFTY 50"
    zerodha_instrument_token: 256265    # NSE index token (used by ZerodhaBroker)
    atm_step: 50            # Strike rounding granularity
    lot_size: 75            # Current lot size — verified 2026
    exchange: "NSE"
    expiry_day: "Thursday"  # Weekly expiry
    enabled: true

  BANKNIFTY:
    upstox_key: "NSE_INDEX|Nifty Bank"
    zerodha_symbol: "NIFTY BANK"
    zerodha_instrument_token: 260105
    atm_step: 100
    lot_size: 15
    exchange: "NSE"
    expiry_day: "Wednesday"
    enabled: true

  SENSEX:
    upstox_key: "BSE_INDEX|SENSEX"
    zerodha_symbol: "SENSEX"
    zerodha_instrument_token: 265
    atm_step: 100
    lot_size: 10
    exchange: "BSE"
    expiry_day: "Friday"
    enabled: false          # Disabled: low volume in index feed; re-enable when stable
    # ASSUMPTION: SENSEX volume is often zero in index feed — data_cleaner will handle this.

# ── Broker ─────────────────────────────────────────────────────────────
broker:
  primary: "zerodha"         # "upstox" | "zerodha"  ← switched to Zerodha
  # Zerodha Kite Connect v3 settings
  request_delay_s: 0.35      # Polite rate-limiting between API calls
  timeout_s: 10
  max_retries: 3
  retry_backoff_s: 1.0
  # Upstox base_url kept for backtester fallback (expired option data)
  upstox_base_url: "https://api.upstox.com/v2"

# ── Kronos Model ───────────────────────────────────────────────────────
kronos:
  model_size: "small"        # NeoQuasar/Kronos-small — 24.7M params, fits in 8 GB RAM on CPU
  repo_path: null            # e.g. "C:/path/to/Kronos"  OR set KRONOS_REPO_PATH in .env
  lookback: 400              # Input bars fed to Kronos (auto-truncated to 512 tokens internally)
  pred_len: 12               # Forecast horizon: 12 bars × 5 min = 60 min ahead
  samples: 5                 # Number of stochastic prediction paths
  temperature: 1.0           # Sampling temperature
  top_p: 0.9                 # Nucleus sampling threshold
  cache_forecasts: true
  cache_ttl_minutes: 5

# ── Signal Engine ──────────────────────────────────────────────────────
signal:
  strong_bullish_move_pct: 0.50
  bullish_move_pct: 0.25
  bearish_move_pct: -0.25
  strong_bearish_move_pct: -0.50

  prob_up_strong: 0.75
  prob_up_directional: 0.65
  prob_down_directional: 0.35
  prob_down_strong: 0.25

  high_dispersion_pct: 0.40
  low_dispersion_pct: 0.20
  high_iv_threshold: 20.0
  low_iv_threshold: 12.0

# ── Options Mapper ─────────────────────────────────────────────────────
options:
  default_strategy:
    STRONG_BULLISH: "buy_atm_ce"
    BULLISH: "bull_put_spread"
    NEUTRAL_HIGH_DISP_LOW_IV: "straddle"
    NEUTRAL_LOW_DISP_HIGH_IV: "iron_condor"
    BEARISH: "bear_call_spread"
    STRONG_BEARISH: "buy_atm_pe"

  spread_otm_strikes: 1

# ── Trading Session ────────────────────────────────────────────────────
trading:
  timezone: "Asia/Kolkata"
  session_start: "09:15"
  session_end: "15:30"
  no_trade_open_mins: 5
  no_trade_close_mins: 15
  square_off_time: "15:15"
  skip_expiry_day: false     # Changed to false — weekly options SELLING targets expiry day
  event_blackout_mins: 30

# Calendar of known high-impact events
event_calendar:
  "2025-12-04": "RBI MPC Policy"
  "2026-02-05": "RBI MPC Policy"
  "2026-04-09": "RBI MPC Policy"
  "2026-06-09": "RBI MPC Policy"
  "2026-08-06": "RBI MPC Policy"
  "2026-10-08": "RBI MPC Policy"
  "2026-12-03": "RBI MPC Policy"
  "2026-01-01": "New Year Holiday"
  "2026-08-15": "Independence Day Holiday"
  "2026-10-02": "Gandhi Jayanti Holiday"

# ── Transaction Costs (Zerodha rate card, July 2026) ───────────────────
costs:
  brokerage_per_order: 20.0         # ₹20 flat per executed order
  stt_sell_options_pct: 0.05        # STT 0.05% on sell-side premium (options)
  exchange_txn_options_pct: 0.053   # NSE exchange transaction charge
  gst_pct: 18.0
  sebi_turnover_pct: 0.0001
  stamp_duty_buy_pct: 0.003
  slippage_ticks: 1

# ── Paper Trading ──────────────────────────────────────────────────────
paper_trading:
  enabled: true
  max_open_positions: 3
  capital_per_trade: 50000
  lots: 1
  notify_on_signal: true

# ── Live Trading ───────────────────────────────────────────────────────
# SAFETY: live trading requires LIVE_TRADING=true in .env AND --live CLI flag
# AND typed confirmation at startup.
live_trading:
  enabled: false              # NEVER change to true here — use .env + --live flag
  max_trades_per_day: 3
  max_capital_per_trade: 50000   # ₹50,000 per individual trade leg
  max_capital_total: 300000      # ₹3,00,000 HARD CAP — enforced by RiskManager
  max_daily_loss_rs: 5000        # Positive value; RiskManager treats as loss threshold
  lots: 1

# ── Database ───────────────────────────────────────────────────────────
database:
  path: "data/kronos_options.db"

# ── Logging ────────────────────────────────────────────────────────────
logging:
  level: "INFO"
  log_to_file: true
  log_dir: "logs/"
  max_bytes: 10485760
  backup_count: 5

# ── Backtester ─────────────────────────────────────────────────────────
backtest:
  use_real_option_data: true
  bs_fallback_when_missing: true
  iv_assumption_pct: 15.0
  default_start: "2026-05-01"
  default_end: "2026-07-04"   # Updated to current
