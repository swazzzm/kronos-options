# ══════════════════════════════════════════════════════════════════════
#  Kronos Options Signal System — Master Configuration
#  Credentials go in .env ONLY. Never hardcode tokens here.
# ══════════════════════════════════════════════════════════════════════

# ── Instruments ────────────────────────────────────────────────────────
instruments:
  NIFTY:
    upstox_key: "NSE_INDEX|Nifty 50"
    zerodha_symbol: "NIFTY 50"
    atm_step: 50            # Strike rounding granularity
    lot_size: 75            # Current lot size — verified 2026; fetch_lot_size: true to override
    exchange: "NSE"
    expiry_day: "Thursday"  # Weekly expiry
    enabled: true

  BANKNIFTY:
    upstox_key: "NSE_INDEX|Nifty Bank"
    zerodha_symbol: "NIFTY BANK"
    atm_step: 100
    lot_size: 15
    exchange: "NSE"
    expiry_day: "Wednesday"
    enabled: true

  SENSEX:
    upstox_key: "BSE_INDEX|SENSEX"
    zerodha_symbol: "SENSEX"
    atm_step: 100
    lot_size: 10
    exchange: "BSE"
    expiry_day: "Friday"
    enabled: true
    # ASSUMPTION: SENSEX volume is often zero in index feed — data_cleaner will handle this.

# ── Broker ─────────────────────────────────────────────────────────────
broker:
  primary: "upstox"          # "upstox" | "zerodha"
  base_url: "https://api.upstox.com/v2"
  request_delay_s: 0.35      # Polite rate-limiting between API calls
  timeout_s: 10
  max_retries: 3
  retry_backoff_s: 1.0

# ── Kronos Model ───────────────────────────────────────────────────────
kronos:
  model_size: "small"        # NeoQuasar/Kronos-small — 24.7M params, fits in 8 GB RAM on CPU
  # Path to cloned https://github.com/shiyu-coder/Kronos repo
  # Override here OR set KRONOS_REPO_PATH in .env (env var takes priority if both set)
  repo_path: null            # e.g. "C:/path/to/Kronos"
  lookback: 400              # Input bars fed to Kronos (auto-truncated to 512 tokens internally)
  pred_len: 12               # Forecast horizon: 12 bars × 5 min = 60 min ahead
  samples: 5                 # Number of stochastic prediction paths (predict() called once per sample)
  temperature: 1.0           # Sampling temperature — higher = more variance in paths
  top_p: 0.9                 # Nucleus sampling threshold
  cache_forecasts: true      # Store in SQLite to avoid re-running same inputs
  cache_ttl_minutes: 5       # Cached forecast expires after 5 min

# ── Signal Engine ──────────────────────────────────────────────────────
signal:
  # Directional signal thresholds (based on Kronos forecast summary stats)
  strong_bullish_move_pct: 0.50    # Expected close move > +0.50% → STRONG_BULLISH
  bullish_move_pct: 0.25           # Expected close move > +0.25% → BULLISH
  bearish_move_pct: -0.25          # Expected close move < -0.25% → BEARISH
  strong_bearish_move_pct: -0.50   # Expected close move < -0.50% → STRONG_BEARISH

  prob_up_strong: 0.75             # prob_up > 75% required for STRONG_BULLISH
  prob_up_directional: 0.65        # prob_up > 65% required for BULLISH
  prob_down_directional: 0.35      # prob_up < 35% → BEARISH
  prob_down_strong: 0.25           # prob_up < 25% → STRONG_BEARISH

  # Volatility/dispersion thresholds for neutral strategies
  high_dispersion_pct: 0.40        # Path endpoint std > 0.40% of close → "volatile"
  low_dispersion_pct: 0.20         # Path endpoint std < 0.20% of close → "tight"
  high_iv_threshold: 20.0          # IV > 20 → "high IV" (favours selling premium)
  low_iv_threshold: 12.0           # IV < 12 → "low IV" (favours buying premium)

# ── Options Mapper ─────────────────────────────────────────────────────
options:
  default_strategy:
    STRONG_BULLISH: "buy_atm_ce"          # or "bull_call_spread"
    BULLISH: "bull_put_spread"
    NEUTRAL_HIGH_DISP_LOW_IV: "straddle"
    NEUTRAL_LOW_DISP_HIGH_IV: "iron_condor"
    BEARISH: "bear_call_spread"
    STRONG_BEARISH: "buy_atm_pe"          # or "bear_put_spread"

  spread_otm_strikes: 1   # Number of ATM steps away for the hedge leg of spreads

# ── Trading Session ────────────────────────────────────────────────────
trading:
  timezone: "Asia/Kolkata"
  session_start: "09:15"
  session_end: "15:30"
  no_trade_open_mins: 5        # No trades 9:15–9:20 (price discovery chaos)
  no_trade_close_mins: 15      # No new trades after 15:15
  square_off_time: "15:15"     # Hard square-off for all paper/live positions
  skip_expiry_day: true        # Skip weekly expiry — theta/gamma extreme
  event_blackout_mins: 30      # No trades 30 min before/after events below

# Calendar of known high-impact events (add new events here)
# Format: YYYY-MM-DD: "Description"
event_calendar:
  # 2025 events
  "2025-12-04": "RBI MPC Policy"
  # 2026 events — add as announced
  "2026-02-05": "RBI MPC Policy"
  "2026-04-09": "RBI MPC Policy"
  "2026-06-09": "RBI MPC Policy"
  "2026-01-01": "New Year Holiday"

# ── Transaction Costs (Zerodha / Upstox rate card, June 2026) ──────────
costs:
  brokerage_per_order: 20.0         # ₹20 flat per executed order
  stt_sell_options_pct: 0.05        # STT 0.05% on sell-side premium (options)
  exchange_txn_options_pct: 0.053   # NSE/BSE exchange transaction charge
  gst_pct: 18.0                     # GST on (brokerage + exchange fees)
  sebi_turnover_pct: 0.0001         # ₹10 per crore (≈ 0.0001%)
  stamp_duty_buy_pct: 0.003         # 0.003% on buy premium
  slippage_ticks: 1                 # 1-tick slippage each side (conservative)
  # ASSUMPTION: tick size = ₹0.05 for options < ₹100, ₹0.10 for options ≥ ₹100

# ── Paper Trading ──────────────────────────────────────────────────────
paper_trading:
  enabled: true
  max_open_positions: 3
  capital_per_trade: 50000     # ₹50,000 notional per paper trade
  lots: 1
  notify_on_signal: true       # Desktop notification via plyer

# ── Live Trading ───────────────────────────────────────────────────────
# SAFETY: live trading requires LIVE_TRADING=true in .env AND --live CLI flag
# AND typed confirmation at startup. Never enable here.
live_trading:
  enabled: false
  max_trades_per_day: 3
  max_capital_per_trade: 50000
  max_daily_loss_rs: -5000     # Hard kill-switch: stop trading if day P&L < -₹5000
  lots: 1

# ── Database ───────────────────────────────────────────────────────────
database:
  path: "data/kronos_options.db"

# ── Logging ────────────────────────────────────────────────────────────
logging:
  level: "INFO"          # DEBUG | INFO | WARNING | ERROR
  log_to_file: true
  log_dir: "logs/"
  max_bytes: 10485760    # 10 MB per log file
  backup_count: 5

# ── Backtester ─────────────────────────────────────────────────────────
backtest:
  # IMPORTANT: Uses Upstox expired-instruments API for real option OHLC data.
  # This is actual historical option prices — NOT Black-Scholes approximation.
  # Black-Scholes fallback is available when API data is missing.
  use_real_option_data: true
  bs_fallback_when_missing: true
  iv_assumption_pct: 15.0    # Used ONLY for Black-Scholes fallback
  default_start: "2026-05-01"
  default_end: "2026-06-09"
